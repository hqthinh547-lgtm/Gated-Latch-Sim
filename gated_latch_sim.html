<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Mô Phỏng Trực Quan Gated Latch (1 Đầu Ra)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h2 { color: #333; }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 550px;
        }
        .circuit-board {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            height: 180px;
            margin: 30px 0;
            background: #fafafa;
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 0 40px;
            box-sizing: border-box;
        }
        .latch-block {
            width: 140px;
            height: 120px;
            background: #2c3e50;
            color: white;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px;
            box-sizing: border-box;
            font-weight: bold;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        .latch-io {
            display: flex;
            justify-content: space-between;
            width: 100%;
            font-size: 18px;
        }
        .btn-input {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 6px;
            transition: all 0.2s;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        .btn-off { background-color: #e74c3c; color: white; }
        .btn-on { background-color: #2ecc71; color: white; }
        
        .led {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }
        .led-off { background-color: #7f8c8d; box-shadow: 0 0 0px #7f8c8d; }
        .led-on { background-color: #f1c40f; box-shadow: 0 0 15px #f1c40f; }

        .status-panel {
            margin-top: 10px;
            font-size: 16px;
            color: #555;
            background: #e8f4fd;
            padding: 10px 20px;
            border-radius: 6px;
            width: 100%;
            text-align: center;
            box-sizing: border-box;
        }
        .wire-label { font-weight: bold; margin-bottom: 5px; text-align: center;}
        .input-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
    </style>
</head>
<body>

    <h2>Mô Phỏng Trực Quan Gated Latch</h2>

    <div class="container">
        <div class="circuit-board">
            
            <div class="input-group">
                <div>
                    <div class="wire-label">Đầu vào Data</div>
                    <button id="btnD" class="btn-input btn-off" onclick="toggleD()">Mức: 0</button>
                </div>
                <div>
                    <div class="wire-label">Write Enable</div>
                    <button id="btnEN" class="btn-input btn-off" onclick="toggleEN()">Mức: 0</button>
                </div>
            </div>

            <div class="latch-block">
                <div style="text-align: center; border-bottom: 1px solid #7f8c8d; padding-bottom: 5px;">Gated Latch</div>
                <div class="latch-io">
                    <div>D<br><br>EN</div>
                    <div style="text-align: right; display: flex; flex-direction: column; justify-content: center;">Q</div>
                </div>
            </div>

            <div style="text-align: center;">
                <div class="wire-label">Đầu ra Q</div>
                <span id="ledQ" class="led led-off"></span>
                <div id="txtQ" style="font-weight: bold; margin-top: 5px; font-size: 18px;">0</div>
            </div>

        </div>

        <div id="status" class="status-panel">
            Write enable = 0: Chốt đang khóa, đầu ra Q được giữ cố định.

        </div>
	        <div id="status" class="status-panel">
            Write enable = 1: Chốt mở, có thể nạp Data vào.

        </div>
    </div>

    <script>
        let D = 0;
        let EN = 0;
        let Q = 0; 

        function updateSimulation() {
            let statusText = "";

            if (EN === 1) {
                Q = D; // Thông suốt: Q chạy theo D
                statusText = `<b>Chốt MỞ (EN = 1):</b> Đầu ra Q thông suốt với đầu vào D. Q cập nhật thành <b>${Q}</b>.`;
            } else {
                // Khóa: Q giữ nguyên giá trị cũ
                statusText = `<b>Chốt KHÓA (EN = 0):</b> Đường truyền bị ngắt. Mọi thay đổi ở D bị chặn lại. Q giữ trạng thái cũ là <b>${Q}</b>.`;
            }

            // Cập nhật giao diện nút D
            const btnD = document.getElementById("btnD");
            btnD.innerText = `Mức: ${D}`;
            btnD.className = D === 1 ? "btn-input btn-on" : "btn-input btn-off";

            // Cập nhật giao diện nút EN
            const btnEN = document.getElementById("btnEN");
            btnEN.innerText = `Mức: ${EN}`;
            btnEN.className = EN === 1 ? "btn-input btn-on" : "btn-input btn-off";

            // Cập nhật đèn LED Q
            const ledQ = document.getElementById("ledQ");
            const txtQ = document.getElementById("txtQ");
            ledQ.className = Q === 1 ? "led led-on" : "led led-off";
            txtQ.innerText = Q;

            document.getElementById("status").innerHTML = statusText;
        }

        function toggleD() {
            D = D === 0 ? 1 : 0;
            updateSimulation();
        }

        function toggleEN() {
            EN = EN === 0 ? 1 : 0;
            updateSimulation();
        }
    </script>
</body>
</html>
